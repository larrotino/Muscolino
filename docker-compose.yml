services:
  muscolino:
    container_name: muscolino-app
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "10009:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3