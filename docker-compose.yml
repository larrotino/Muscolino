services:
  muscolino:
    container_name: muscolino-app
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "10009:3000"
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
